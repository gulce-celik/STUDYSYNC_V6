server:
  port: 8080

spring:
  application:
    name: studysync-backend
  datasource:
    url: jdbc:h2:mem:studysync_test
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # =========================================================
  # DEMO SONRASI İÇİN POSTGRESQL AYARLARI (Şu an kapalı)
  # H2'den PostgreSQL'e geçmek için yukarıdaki H2 datasource 
  # satırlarını (#) ile yoruma alıp, aşağıdakileri açın:
  # =========================================================
  # datasource:
  #   url: jdbc:postgresql://localhost:5432/studysync
  #   username: postgres
  #   password: password
  #   driver-class-name: org.postgresql.Driver
